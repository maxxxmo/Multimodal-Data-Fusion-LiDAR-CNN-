dataset:
  pc_range: [0, -39.68, -3, 69.12, 39.68, 1] #[min_x, min_y, min_z, max_x, max_y, max_z]
  grid_size: [432, 496] #[H,W]
  data_path: "./data/kitti_lidar"
  num_channels: 3
  anchor_sizes: [[3.9, 1.6, 1.56]] 
  anchor_rotations: [0]
train_params:
  workers: 2         
  batch: 16         
  epochs: 50
  optimizer: "AdamW"
  lr: 0.0001       
  weight_decay: 0.01  
  patience: 20       
  save: True          
  cache: True   
  exist_ok: True
experiment_name: "multimodal_detector_lidar"
run_name: "First Tests LiDAR"
model_variant: "PillarBackbone"